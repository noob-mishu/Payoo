<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payoo | Your Financial Partner</title>
  <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

  <!-- tailwind + daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">

  <!-- icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />


  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>

<body class="min-h-screen max-w-md bg-blue-50 mx-auto">
  <div class="logo w-[300px] mx-auto py-20">
    <img src="assets/Logo-full.png" alt="">
  </div>

  <div>
    <fieldset class="fieldset bg-white border-base-300 rounded-box w-xs border p-4 mx-auto rounded-2xl">

      <label class="label text-neutral font-bold">Mobile Number</label>
      <input maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200" placeholder="Mobile Number" />

      <label class="label text-neutral font-bold">Password</label>
      <input type="password" class="input rounded-full bg-base-200 " placeholder="Password" />

      <button class="btn btn-primary mt-4 rounded-full hover:bg-indigo-500 hover:border-hidden">Login</button>

      <button class="btn bg-white text-black border-[#e5e5e5] mt-2 rounded-lg hover:bg-blue-500">
        <svg aria-label="Email icon" width="16" height="16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="black">
            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
          </g>
        </svg>
        Login with Email
      </button>

      <button class="btn bg-white text-black border-[#e5e5e5] rounded-lg hover:bg-blue-500">
        <svg aria-label="Google logo" width="16" height="16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <g>
            <path d="m0 0H512V512H0" fill="#fff"></path>
            <path fill="#34a853" d="M153 292c30 82 118 95 171 60h62v48A192 192 0 0190 341"></path>
            <path fill="#4285f4" d="m386 400a140 175 0 0053-179H260v74h102q-7 37-38 57"></path>
            <path fill="#fbbc02" d="m90 341a208 200 0 010-171l63 49q-12 37 0 73"></path>
            <path fill="#ea4335" d="m153 219c22-69 116-109 179-50l55-54c-78-75-230-72-297 55"></path>
          </g>
        </svg>
        Login with Google
      </button>
    </fieldset>
  </div>
</body>

</html>
