<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payoo | Homepage</title>
  <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

  <!-- tailwind + daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">

  <!-- icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />


  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">

  <header class="border-b-2 border-gray-300 py-5 sticky top-0 bg-base-300 z-10">
    <section class="w-11/12 mx-auto flex items-center justify-between py-3">
      <div class="left">
        <div class="flex items-center justify-between gap-1">
          <img class="w-[50px]" src="assets/logo.png" alt="">
          <div class="balance-info">
            <h1 class="font-bold text-2xl">$<span id="balance">45000</span></h1>
            <p class="tracking-wider text-neutral/50">Available Balance</p>
          </div>
        </div>



      </div>

      <div class="right">
        <a class="btn" href="./index.html"><i class="fa-solid fa-arrow-right-from-bracket rotate-180"></i>Log Out</a>
      </div>

    </section>
  </header>

  <section class="w-11/12 mx-auto py-10 space-y-5">
    <h1 class="text-3xl font-semibold">Welcome to Pay<span class="text-blue-600">oo</span></h1>
    <p class="text-neutral/50">Enjoy Easy and Secure Money Transfers With Us.... <br>
      Cashout Charge Is Low. </p>
  </section>


  <section class="w-11/12 mx-auto">
    <div class="grid grid-cols-3 gap-2">
      <!-- Add Money -->
      <button class="btn flex-col h-full items-center justify-center rounded-lg py-5 space-y-2">
        <img src="./assets/opt-1.png" alt="">
        <p class="text-neutral/50">Add Money</p>
      </button>

      <!-- Cash Out -->
      <div class="btn flex-col h-full items-center justify-center rounded-lg py-5 space-y-2">
        <img src="./assets/opt-2.png" alt="">
        <p class="text-neutral/50">Cash Out</p>
      </div>

      <!-- Transfer Money -->
      <div class="btn flex-col h-full items-center justify-center rounded-lg py-5 space-y-2">
        <img src="./assets/opt-3.png" alt="">
        <p class="text-neutral/50">Send Money</p>
      </div>


      <!-- Get Bonus -->
      <div class="btn flex-col h-full items-center justify-center rounded-lg py-5 space-y-2">
        <img src="./assets/opt-4.png" alt="">
        <p class="text-neutral/50">Get Bonus</p>
      </div>

      <!-- Pay Bill -->
      <div class="btn flex-col h-full items-center justify-center rounded-lg py-5 space-y-2">
        <img src="./assets/opt-5.png" alt="">
        <p class="text-neutral/50">Pay Bill</p>
      </div>

      <!-- Transactions -->
      <div class="btn flex-col h-full items-center justify-center rounded-lg py-5 space-y-2">
        <img src="./assets/opt-6.png" alt="">
        <p class="text-neutral/50">Transactions</p>
      </div>

    </div>
  </section>

  <section id="cashOut" class="w-11/12 mx-auto py-5">
    <h2 class="text-xl font-bold mb-5">Cash Out</h2>
    <div>
      <fieldset class="fieldset bg-white border-base-300 rounded-box w-full border p-4 mx-auto rounded-2xl">

        <label class="label text-neutral font-bold">Agent Number</label>
        <input id="cashOut-Number" maxlength="11" minlength="11" type="text"
          class="input rounded-full bg-base-200 w-full" placeholder="Enter Agent Number" />

        <label class="label text-neutral font-bold">Amount</label>
        <input id="cashOut-Amount" type="number"
          class="input rounded-full bg-base-200 w-full" placeholder="Enter Amount for Withdraw" />

        <label class="label text-neutral font-bold">Pin</label>
        <input id="cashOut-Pin" type="password" maxlength="4" class="input rounded-full bg-base-200 w-full"
          placeholder="Pin" />

        <button id="cashOut-btn"
          class="btn btn-primary mt-4 rounded-full hover:bg-indigo-500 hover:border-hidden">Withdraw Money</button>


      </fieldset>
    </div>

  </section>




  <script src="script/common.js"></script>
  <script  src="script/cashout.js"></script>
</body>



</html>
